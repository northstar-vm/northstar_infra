services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: northstar-filebrowser
    restart: unless-stopped
    user: "${NORTHSTAR_FILE_UID:-1000}:${NORTHSTAR_FILE_GID:-1000}"
    command: --address 0.0.0.0 --port 80 --root /srv --database /database/filebrowser.db --baseURL /files --noauth
    volumes:
      - /opt/northstar/admin/files:/srv
      - /opt/northstar/admin/filebrowser/database:/database
      - /opt/northstar/admin/filebrowser/config:/config
    networks:
      - northstar_web

  status:
    image: python:3.13-alpine
    container_name: northstar-status
    restart: unless-stopped
    environment:
      DOCKER_ALLOWED_CONTAINERS: "northstar-caddy,northstar-cv-web,northstar-filebrowser,northstar-minecraft,northstar-status,quizzy-backend-1,quizzy-frontend-1,quizzy-mongo-1,quizzy-web-1,telecart-backend,telecart-frontend,telecart-postgres,telecart-redis"
      DOCKER_PROTECTED_CONTAINERS: "northstar-caddy,northstar-filebrowser,northstar-status"
      METRICS_RETENTION_DAYS: "10"
      METRICS_SAMPLE_SECONDS: "60"
    command: python /app/status_server.py
    volumes:
      - ./status:/app:ro
      - /opt/northstar/admin/status-data:/data
      - /opt/northstar/backups/minecraft:/backups/minecraft
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
      - /proc:/host/proc:ro
    networks:
      - northstar_web

networks:
  northstar_web:
    external: true

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: northstar-portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock --base-url /docker --http-enabled
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - northstar_web

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: northstar-filebrowser
    restart: unless-stopped
    command: --address 0.0.0.0 --port 80 --root /srv --database /database/filebrowser.db --baseURL /files
    volumes:
      - /:/srv
      - filebrowser_database:/database
    networks:
      - northstar_web

  status:
    image: python:3.13-alpine
    container_name: northstar-status
    restart: unless-stopped
    command: python /app/status_server.py
    volumes:
      - ./status:/app:ro
      - /:/host:ro
      - /proc:/host/proc:ro
      - /opt/northstar/apps/minecraft/data/logs:/minecraft-logs:ro
    networks:
      - northstar_web

volumes:
  portainer_data:
  filebrowser_database:

networks:
  northstar_web:
    external: true

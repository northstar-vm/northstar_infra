services:
  minecraft:
    image: itzg/minecraft-server:java25
    container_name: northstar-minecraft
    restart: "no"
    ports:
      - "25677:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MINECRAFT_VERSION:-LATEST}"
      MEMORY: "${MEMORY:-12G}"
      MOTD: |-
        §b✦ Northstar§r
        §7Скиньте ник, чтобы добавиться в Whitelist
      MODE: "survival"
      DIFFICULTY: "normal"
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      CREATE_CONSOLE_IN_PIPE: "TRUE"
      RESOURCE_PACK: "https://mc.attentionisallineed.xyz/resourcepacks/northstar-resource-pack.zip"
      RESOURCE_PACK_SHA1: "85f5705c60394aeca845d056cb6f5840578670d8"
      REQUIRE_RESOURCE_PACK: "FALSE"
      OPS: "${OPS:-}"
      WHITELIST: "${WHITELIST:-}"
      UID: "${MINECRAFT_UID:-1000}"
      GID: "${MINECRAFT_GID:-1000}"
    volumes:
      - /opt/northstar/apps/minecraft/data:/data
    networks:
      - northstar_web

networks:
  northstar_web:
    external: true

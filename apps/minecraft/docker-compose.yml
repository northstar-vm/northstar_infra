services:
  minecraft:
    image: itzg/minecraft-server:java25
    container_name: northstar-minecraft
    restart: "no"
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MINECRAFT_VERSION:-LATEST}"
      MEMORY: "${MEMORY:-12G}"
      MOTD: "${SERVER_NAME:-Northstar}"
      MODE: "survival"
      DIFFICULTY: "normal"
      ONLINE_MODE: "TRUE"
      OPS: "${OPS:-}"
      WHITELIST: "${WHITELIST:-}"
    volumes:
      - /opt/northstar/apps/minecraft/data:/data
    networks:
      - northstar_web

networks:
  northstar_web:
    external: true

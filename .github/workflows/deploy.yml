name: Deploy Infra

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: northstar-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: northstar_vm
    steps:
      - name: Deploy infra on Northstar VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NORTHSTAR_HOST }}
          username: ${{ secrets.NORTHSTAR_USER }}
          key: ${{ secrets.NORTHSTAR_SSH_KEY }}
          script: |
            set -euo pipefail
            bash /opt/northstar/infra/scripts/deploy-infra.sh
